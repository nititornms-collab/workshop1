<!DOCTYPE html>
<html>
    <head></head>
<body>
    <h1>Workshop 3.1</h1>
    <script src="scripht.js"></script>
    <script>
        let student = "วันเพ็ญ";
        let mark1 = 75;
        let mark2 = 48;
        let mark3 = 68;
        document.write("<h2>",student,"ได้คะแนน","mark1","</h2>");
        document.write("<h2>",student,"ได้คะแนน","mark2","</h2>");
        document.write("<h2>",student,"ได้คะแนน","mark3","</h2>");
        let avg = (mark1 + mark2 + mark3)/3;
        document.write("<h2>",student,"ได้คะแนนเฉลี่ย",avg,"</h2>");
        let grade=null;
        if(avg>=80){
            grade="A";
        }else if(avg>=70){ 
            grade="B";
        }else{
            grade="E";
        }
        document.write("<h1>Grade: ",grade,"</h1>");
    </script>
</body>
</html>
